{% extends "base.html" %}
{% block content %}
<div class="form-card">
  <h2>Login</h2>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post">
    <label>Username <input type="text" name="username" required></label>
    <label>Password <input type="password" name="password" required></label>
    <button type="submit">Login</button>
  </form>
</div>
{% endblock %}
